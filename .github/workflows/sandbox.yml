name: SnowDuckAI Sandbox

on:
  workflow_dispatch:
    inputs:
      fix_data:
        description: 'Base64-encoded JSON with file_path, fixed_content, explanation'
        required: true
        type: string
      manifest:
        description: 'Base64-encoded dbt manifest (optional)'
        required: false
        type: string

jobs:
  test-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dbt-core and dbt-duckdb
        run: |
          pip install --upgrade pip
          pip install dbt-core dbt-duckdb
          dbt --version

      - name: Decode fix data
        id: decode
        run: |
          echo "${{ inputs.fix_data }}" | base64 -d > /tmp/fix_data.json
          cat /tmp/fix_data.json
          echo "Fix data decoded successfully"

      - name: Find dbt project root
        id: find_project
        run: |
          # Find dbt_project.yml in the repository (exclude target directories)
          PROJECT_FILE=$(find . -name "dbt_project.yml" -not -path "*/target/*" | head -n 1)

          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ Error: No dbt_project.yml found in repository"
            exit 1
          fi

          # Get the directory containing dbt_project.yml
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          echo "project_dir=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "Found dbt project at: $PROJECT_DIR"

      - name: Extract fix details
        id: extract
        run: |
          FILE_PATH=$(jq -r '.file_path' /tmp/fix_data.json)
          EXPLANATION=$(jq -r '.explanation' /tmp/fix_data.json)

          # Sanitize explanation for GITHUB_OUTPUT (remove backticks, quotes, newlines)
          SANITIZED_EXPLANATION=$(echo "$EXPLANATION" | tr -d '`' | tr -d "'" | tr '\n' ' ' | tr -s ' ')

          echo "file_path=$FILE_PATH" >> $GITHUB_OUTPUT
          echo "explanation=$SANITIZED_EXPLANATION" >> $GITHUB_OUTPUT
          echo "Fixing: $FILE_PATH"
          echo "Reason: $EXPLANATION"

      - name: Apply fix to model file
        run: |
          FILE_PATH="${{ steps.extract.outputs.file_path }}"
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"

          echo "Applying fix to $PROJECT_DIR/$FILE_PATH..."

          # Create directory if it doesn't exist
          mkdir -p "$PROJECT_DIR/$(dirname "$FILE_PATH")"

          # Extract fixed content from JSON and write to file
          jq -r '.fixed_content' /tmp/fix_data.json > "$PROJECT_DIR/$FILE_PATH"

          echo "Fix applied successfully"
          echo "File size: $(wc -c < "$PROJECT_DIR/$FILE_PATH") bytes"

      - name: Create profiles.yml for DuckDB
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          mkdir -p "$PROJECT_DIR"
          cat > "$PROJECT_DIR/profiles.yml" <<EOF
          project_red_test:
            target: dev
            outputs:
              dev:
                type: duckdb
                path: sandbox.duckdb
                threads: 1
          EOF

          echo "DuckDB profile created at $PROJECT_DIR/profiles.yml"

      - name: Run dbt debug
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          dbt debug --project-dir "$PROJECT_DIR" --profiles-dir "$PROJECT_DIR"

      - name: Run dbt seed
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          dbt seed --project-dir "$PROJECT_DIR" --profiles-dir "$PROJECT_DIR" --full-refresh

      - name: Run dbt run
        id: dbt_run
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          echo "Running dbt models with applied fix..."
          dbt run --project-dir "$PROJECT_DIR" --profiles-dir "$PROJECT_DIR"

      - name: Run dbt test
        id: dbt_test
        run: |
          PROJECT_DIR="${{ steps.find_project.outputs.project_dir }}"
          echo "Running dbt tests..."
          dbt test --project-dir "$PROJECT_DIR" --profiles-dir "$PROJECT_DIR" || echo "No tests found or tests failed"

      - name: Verify fix success
        run: |
          echo "✅ Fix verification complete!"
          echo "The proposed fix passed dbt run successfully."
          echo ""
          echo "Explanation: ${{ steps.extract.outputs.explanation }}"

      - name: Cleanup on failure
        if: failure()
        run: |
          echo "❌ Fix verification failed"
          echo "The proposed fix did not resolve the dbt error."
          echo ""
          echo "File: ${{ steps.extract.outputs.file_path }}"
          echo "Explanation: ${{ steps.extract.outputs.explanation }}"
          echo ""
          echo "Check the logs above for details on what went wrong."
          exit 1
